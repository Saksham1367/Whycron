name: Publish Python SDK

# Trusted publishing to PyPI via OIDC — no API token needed.
# Triggered when a git tag of the form ``sdk-py-v0.1.0`` is pushed.
#
# One-time PyPI setup (do this before the first release):
#   1. Sign in at https://pypi.org/ with the Whycron publisher account.
#   2. Account settings -> Publishing -> Add a new pending publisher.
#   3. Fill in:
#        PyPI Project Name:      whycron
#        Owner:                  Saksham1367
#        Repository name:        Whycron
#        Workflow name:          publish-python-sdk.yml
#        Environment name:       pypi
#   4. Save. After the first successful publish, the pending entry becomes
#      a permanent trusted publisher.

on:
  push:
    tags:
      - "sdk-py-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sdks/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(python -c "import re,pathlib; m=re.search(r'version\\s*=\\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text()); print(m.group(1))")
          TAG_VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: apps/sdks/python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/whycron/
    permissions:
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
