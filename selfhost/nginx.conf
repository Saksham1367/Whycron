server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every non-asset path resolves to index.html so the
    # React router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed bundle artifacts (Vite emits hashes
    # in filenames, so cache-busting is safe).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache the HTML entry point — it references the hashed bundle.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
